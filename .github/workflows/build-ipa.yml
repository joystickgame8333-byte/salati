name: Build IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project Salati.xcodeproj \
            -scheme Salati \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/Salati.app Payload/
          /usr/bin/zip -qry Salati-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Salati-unsigned-ipa
          path: Salati-unsigned.ipa
          if-no-files-found: error
